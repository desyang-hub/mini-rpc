version: '3'

services:
  nacos-standalone:
    image: nacos/nacos-server:v3.1.0
    container_name: nacos-standalone
    environment:
      - MODE=standalone  # 必须显式指定单机模式（Nacos 3.x 要求）
    ports:
      - "8848:8848"   # Nacos 客户端通信端口
      - "9848:9848"   # gRPC 端口（Nacos 2.x+ 心跳/服务发现）
      - "8080:8080"   # Web 控制台端口（注意：v3.x 默认使用 8080 而非 8848 提供 Web UI）
    restart: always
    # 可选：启用认证（建议生产环境开启）
